version: 2

# Non-security version PRs skip major bumps entirely — majors need manual
# upgrade paths for frameworks like React/Vite/TS. Security updates (CVEs)
# are handled by a separate Dependabot mechanism and still open PRs regardless.

updates:
  # npm deps — one grouped PR per week for minor/patch only.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  # GitHub Actions — keep runners/actions current, minor/patch only.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - ci
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
